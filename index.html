<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Census Chat Agent Demo</title>
    <style>
      :root {
        --bg: #f7f7f4;
        --panel: #ffffff;
        --ink: #1b1f23;
        --muted: #68707a;
        --line: #d9ded7;
        --accent: #096b72;
        --soft: #eef4f2;
        --warn: #9a5b00;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
      }

      .shell {
        min-height: 100vh;
        padding: 24px;
      }

      .workspace {
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        min-height: calc(100vh - 48px);
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 50px rgba(27, 31, 35, 0.08);
      }

      aside {
        display: flex;
        flex-direction: column;
        gap: 24px;
        padding: 28px;
        border-right: 1px solid var(--line);
        background: #f1f5f2;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        line-height: 1.05;
      }

      p {
        margin: 0;
      }

      .muted {
        color: var(--muted);
        line-height: 1.45;
      }

      .status {
        display: grid;
        gap: 12px;
        margin-top: auto;
        color: #064c52;
        font-size: 14px;
      }

      .reset,
      .chip,
      .send {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--ink);
        font: inherit;
        cursor: pointer;
      }

      .reset {
        min-height: 42px;
      }

      .chat {
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto auto;
        min-width: 0;
      }

      .messages {
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-height: 0;
        overflow-y: auto;
        padding: 32px min(5vw, 64px);
      }

      .message {
        display: flex;
      }

      .message.user {
        justify-content: flex-end;
      }

      .bubble {
        max-width: min(720px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px 16px;
        background: var(--panel);
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .user .bubble {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      .warning {
        margin-top: 12px;
        color: var(--warn);
        font-size: 14px;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 0 min(5vw, 64px) 16px;
      }

      .chip {
        min-height: 34px;
        border-radius: 999px;
        background: var(--soft);
        color: #064c52;
        padding: 7px 12px;
        text-align: left;
      }

      form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 46px;
        gap: 10px;
        padding: 18px min(5vw, 64px) 24px;
        border-top: 1px solid var(--line);
      }

      textarea {
        width: 100%;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px 14px;
        font: inherit;
      }

      .send {
        width: 46px;
        height: 46px;
        align-self: end;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #ffffff;
      }

      @media (max-width: 820px) {
        .shell {
          padding: 0;
        }

        .workspace {
          grid-template-columns: 1fr;
          min-height: 100vh;
          border: 0;
          border-radius: 0;
        }

        aside {
          padding: 18px;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        h1 {
          font-size: 23px;
        }

        .messages,
        .chips,
        form {
          padding-left: 18px;
          padding-right: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <aside>
          <div>
            <h1>Census Chat Agent</h1>
            <p class="muted">Public fallback demo for US population and demographic questions.</p>
          </div>
          <div class="status">
            <span>Data: ACS 2022 state-level fixture</span>
            <span>Guardrails: active</span>
            <span>Context: recent-turn memory</span>
          </div>
          <button class="reset" id="reset" type="button">New chat</button>
        </aside>
        <section class="chat">
          <div class="messages" id="messages" aria-live="polite"></div>
          <div class="chips" id="starters"></div>
          <form id="form">
            <textarea
              id="input"
              rows="2"
              placeholder="Ask about state population, age, income, poverty, or demographic counts..."
              aria-label="Message"
            ></textarea>
            <button class="send" type="submit" aria-label="Send">↑</button>
          </form>
        </section>
      </section>
    </main>
    <script>
      const metrics = {
        total_population: { label: "Total population", unit: "count", aliases: ["population", "people", "residents", "populous"] },
        median_age: { label: "Median age", unit: "years", aliases: ["median age", "age"] },
        median_household_income: { label: "Median household income", unit: "dollars", aliases: ["median income", "household income", "median household income"] },
        per_capita_income: { label: "Per capita income", unit: "dollars", aliases: ["per capita income"] },
        poverty_rate: { label: "Poverty rate", unit: "percent", aliases: ["poverty", "poverty rate", "below poverty"] },
        white_population: { label: "White population", unit: "count", aliases: ["white"] },
        black_population: { label: "Black or African American population", unit: "count", aliases: ["black", "african american"] },
        asian_population: { label: "Asian population", unit: "count", aliases: ["asian"] },
        hispanic_population: { label: "Hispanic or Latino population", unit: "count", aliases: ["hispanic", "latino", "latina"] }
      };

      const data = {
        "united states": { total_population: 333287557, median_age: 38.9, median_household_income: 74755, per_capita_income: 41104, poverty_rate: 12.5, white_population: 204277273, black_population: 41078951, asian_population: 19886228, hispanic_population: 63664273 },
        "california": { total_population: 39029342, median_age: 37.3, median_household_income: 91551, per_capita_income: 46661, poverty_rate: 12.2, white_population: 16160485, black_population: 2176594, asian_population: 6172319, hispanic_population: 15683121 },
        "texas": { total_population: 30029572, median_age: 35.5, median_household_income: 72584, per_capita_income: 37514, poverty_rate: 14.0, white_population: 14817023, black_population: 3694669, asian_population: 1656441, hispanic_population: 12068166 },
        "florida": { total_population: 22244823, median_age: 42.7, median_household_income: 67474, per_capita_income: 39218, poverty_rate: 12.7, white_population: 14067427, black_population: 3531056, asian_population: 679451, hispanic_population: 6007296 },
        "new york": { total_population: 19677151, median_age: 39.8, median_household_income: 79291, per_capita_income: 47437, poverty_rate: 13.9, white_population: 12130422, black_population: 2816840, asian_population: 1752235, hispanic_population: 3771720 }
      };

      const starters = [
        "What is the population of California?",
        "Compare Texas and Florida by median age.",
        "Which states have the largest populations?",
        "What is the poverty rate in New York?"
      ];

      let messages = [];
      const messageNode = document.getElementById("messages");
      const startersNode = document.getElementById("starters");
      const inputNode = document.getElementById("input");

      function normalize(value) {
        return value.toLowerCase().replace(/[^a-z0-9 ]+/g, " ").replace(/\s+/g, " ").trim();
      }

      function title(value) {
        return value.replace(/\b[a-z]/g, (char) => char.toUpperCase());
      }

      function detectMetric(text) {
        const normalized = normalize(text);
        for (const [key, metric] of Object.entries(metrics)) {
          if (metric.aliases.some((alias) => normalized.includes(normalize(alias)))) return key;
        }
        for (let index = messages.length - 1; index >= 0; index -= 1) {
          if (messages[index].role === "user") {
            const previous = detectMetricFromTextOnly(messages[index].content);
            if (previous) return previous;
          }
        }
        return "total_population";
      }

      function detectMetricFromTextOnly(text) {
        const normalized = normalize(text);
        for (const [key, metric] of Object.entries(metrics)) {
          if (metric.aliases.some((alias) => normalized.includes(normalize(alias)))) return key;
        }
        return null;
      }

      function detectGeographies(text) {
        const normalized = normalize(text);
        if (/\b(united states|usa|us overall|national|nationwide)\b/.test(normalized)) return ["united states"];
        return Object.keys(data).filter((name) => normalized.includes(name) && name !== "united states");
      }

      function format(value, unit) {
        if (unit === "dollars") return "$" + Math.round(value).toLocaleString("en-US");
        if (unit === "percent") return value.toLocaleString("en-US", { maximumFractionDigits: 1 }) + "%";
        if (unit === "years") return value.toLocaleString("en-US", { maximumFractionDigits: 1 }) + " years";
        return Math.round(value).toLocaleString("en-US");
      }

      function answer(question) {
        const normalized = normalize(question);
        if (["recipe", "weather", "stock", "sports", "movie", "write code", "joke"].some((word) => normalized.includes(word))) {
          return "I only answer questions grounded in US Census population and demographic data.";
        }

        const metric = detectMetric(question);
        const geographies = detectGeographies(question);
        const isRank = /\b(top|largest|highest|most populous|rank)\b/.test(normalized);
        const isBottom = /\b(bottom|lowest|smallest|least)\b/.test(normalized);
        const metricInfo = metrics[metric];

        if (isRank || isBottom) {
          const rows = Object.entries(data)
            .filter(([name]) => name !== "united states")
            .sort((a, b) => (isBottom ? a[1][metric] - b[1][metric] : b[1][metric] - a[1][metric]))
            .slice(0, 5)
            .map(([name, values], index) => `${index + 1}. ${title(name)}: ${format(values[metric], metricInfo.unit)}`);
          return `${metricInfo.label}, ranked by available state fixture data:\n${rows.join("\n")}\n\nNote: This public fallback demo uses a small ACS 2022 state-level fixture. The private repo contains the full Next.js app and provider boundary for live Census/Snowflake deployment.`;
        }

        if (geographies.length === 0) {
          return "Which geography should I look up? This public fallback demo supports United States, California, Texas, Florida, and New York.";
        }

        const rows = geographies.map((name) => `${title(name)}: ${metricInfo.label}: ${format(data[name][metric], metricInfo.unit)}.`);
        return `${rows.join("\n")}\n\nSource: ACS 2022 values mirrored into the public fallback fixture. The production app is designed to use live Census API or Snowflake credentials.`;
      }

      function render() {
        messageNode.innerHTML = "";
        for (const message of messages) {
          const wrapper = document.createElement("article");
          wrapper.className = "message " + message.role;
          const bubble = document.createElement("div");
          bubble.className = "bubble";
          bubble.textContent = message.content;
          wrapper.appendChild(bubble);
          messageNode.appendChild(wrapper);
        }
        startersNode.innerHTML = "";
        if (messages.length <= 1) {
          for (const starter of starters) {
            const button = document.createElement("button");
            button.className = "chip";
            button.type = "button";
            button.textContent = starter;
            button.addEventListener("click", () => send(starter));
            startersNode.appendChild(button);
          }
        }
        messageNode.scrollTop = messageNode.scrollHeight;
      }

      function send(text) {
        const question = text.trim();
        if (!question) return;
        messages.push({ role: "user", content: question });
        messages.push({ role: "assistant", content: answer(question) });
        inputNode.value = "";
        render();
      }

      document.getElementById("form").addEventListener("submit", (event) => {
        event.preventDefault();
        send(inputNode.value);
      });
      document.getElementById("reset").addEventListener("click", () => {
        messages = [{ role: "assistant", content: "Ask a US population or demographic question. This public fallback demo preserves follow-up context and shows graceful refusals without requiring local setup." }];
        render();
      });

      messages = [{ role: "assistant", content: "Ask a US population or demographic question. This public fallback demo preserves follow-up context and shows graceful refusals without requiring local setup." }];
      render();
    </script>
  </body>
</html>
